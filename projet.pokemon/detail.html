<!DOCTYPE html>
<html>
<head>
    <title>Détails Questions</title>

    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="js/script_details.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body onload="loadXMLDoc()">
    <div class="container-fluid">
        <a class="btn btn-primary" href="apprendre.html" role="button">Retour vers page précédente</a>
    </div>
    <div class="container-fluid text-center ms-5">
        <h1 class="mb-4 text-center">Informations Questions</h1>
        <table>
            <tr>
                <td></td>
                <td><img id="txtImg" src="" alt="Image de la question" class="img-fluid" style="max-width: 400px;"></td>
            </tr>
            <tr>
                <td><label class="form-label">Question :</label></td>
                <td><input type="text" id="txtQuestion" size="50" class="form-control" disabled readonly></td>
            </tr>
            <tr>
                <td><label class="form-label">Thematique :</label></td>
                <td><input type="text" id="txtThematique" class="form-control" disabled readonly></td>
            </tr>
            <tr>
                <td><label class="form-label">Niveau de difficulté :</label></td>
                <td><input type="text" id="txtDifficulte" class="form-control" disabled readonly></td>
            </tr>
            <tr>
                <td><label class="form-label">Première réponse :</label></td>
                <td><input type="text" id="txtRp1" class="form-control" disabled readonly></td>
            </tr>
            <tr>
                <td><label class="form-label">Deuxième réponse :</label></td>
                <td><input type="text" id="txtRp2" class="form-control" disabled readonly></td>
            </tr>
            <tr>
                <td><label class="form-label">Troisième réponse :</label></td>
                <td><input type="text" id="txtRp3" class="form-control" disabled readonly></td>
            </tr>
            <tr>
                <td><label class="form-label">Bonne réponse :</label></td>
                <td><input type="text" id="txtBonneRp" class="form-control" disabled readonly></td>
            </tr>
            <tr>
                <td><label class="form-label">Nombre de points accordés :</label></td>
                <td><input type="text" id="txtPnts" class="form-control" disabled readonly></td>
            </tr>
        </table>
    </div>
</body>
</html>
